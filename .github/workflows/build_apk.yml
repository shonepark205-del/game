name: 🚀 Android APK Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential \
            ccache libltdl-dev

      - name: ☕ Set up Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: 🔧 Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.36
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 💾 Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: 💾 Cache .buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('main.py') }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-
            buildozer-local-${{ runner.os }}-

      - name: 🔨 Build Debug APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      # APK 위치를 찾아서 output/ 폴더로 모으기
      - name: 🔍 Locate and collect APK files
        run: |
          echo "=== 전체 APK 검색 ==="
          find . -name "*.apk" 2>/dev/null || echo "APK 없음"

          mkdir -p output

          # bin/ 우선, 없으면 .buildozer/ 안에서도 찾기
          if find bin -name "*.apk" 2>/dev/null | grep -q .; then
            cp bin/*.apk output/
            echo "bin/ 에서 APK 복사 완료"
          elif find .buildozer -name "*.apk" 2>/dev/null | grep -q .; then
            find .buildozer -name "*.apk" -exec cp {} output/ \;
            echo ".buildozer/ 에서 APK 복사 완료"
          else
            echo "❌ APK 파일을 찾지 못했습니다. build.log 확인 필요"
            tail -50 build.log
            exit 1
          fi

          echo "=== output/ 폴더 ==="
          ls -lh output/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: space-escape-game-debug-apk
          path: output/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📋 Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-failure-log
          path: build.log
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📥 Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: space-escape-game-debug-apk
          path: ./release-apk

      - name: 🏷️ Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: "Space Escape Game ${{ github.ref_name }}"
          body: |
            ## 🚀 Space Escape Game ${{ github.ref_name }}

            **개발사:** 오리온 | **개발자:** 박시현

            ### 설치 방법
            1. 아래 `.apk` 파일을 안드로이드 기기에 다운로드
            2. 설정 → 보안 → **출처를 알 수 없는 앱 설치** 허용
            3. APK 파일 실행하여 설치
          files: ./release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
