name: 🚀 Android APK Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK (Docker)
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ✅ Kivy 공식 Docker 이미지로 빌드 (환경 문제 완전 해결)
      - name: 🐳 Build APK via Docker (Kivy/Buildozer)
        run: |
          docker run --rm \
            --volume "$(pwd)":/home/user/hostcwd \
            --workdir /home/user/hostcwd \
            -e ANDROIDSDK=/home/user/.buildozer/android/platform/android-sdk \
            -e ANDROIDNDK=/home/user/.buildozer/android/platform/android-ndk-r25b \
            kivy/buildozer:latest \
            android debug

      - name: 🔍 Locate and collect APK files
        run: |
          echo "=== APK 검색 ==="
          find . -name "*.apk" 2>/dev/null || echo "없음"

          mkdir -p output

          if find bin -name "*.apk" 2>/dev/null | grep -q .; then
            cp bin/*.apk output/
            echo "✅ bin/ 에서 복사"
          elif find .buildozer -name "*.apk" 2>/dev/null | grep -q .; then
            find .buildozer -name "*.apk" -exec cp {} output/ \;
            echo "✅ .buildozer/ 에서 복사"
          else
            echo "❌ APK를 찾지 못했습니다"
            exit 1
          fi

          ls -lh output/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: space-escape-game-debug-apk
          path: output/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📋 Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-failure-logs
          path: |
            .buildozer/logs/
            *.log
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📥 Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: space-escape-game-debug-apk
          path: ./release-apk

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Space Escape Game ${{ github.ref_name }}"
          body: |
            ## 🚀 Space Escape Game ${{ github.ref_name }}
            **개발사:** 오리온 | **개발자:** 박시현

            ### 설치 방법
            1. 아래 `.apk` 파일을 안드로이드 기기에 다운로드
            2. 설정 → 보안 → **출처를 알 수 없는 앱 설치** 허용
            3. APK 파일 실행하여 설치
          files: ./release-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
