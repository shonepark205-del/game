name: 🚀 Android APK Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ 핵심: 공식 액션으로 Android SDK 완전 설치
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3

      # ✅ SDK 라이선스 동의 + Build-Tools 명시적 설치
      - name: 📜 Install Android Build-Tools and accept licenses
        run: |
          yes | sdkmanager --licenses
          sdkmanager "build-tools;34.0.0" "platforms;android-33" "platform-tools"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential \
            ccache libltdl-dev

      - name: 🔧 Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.36

      - name: 💾 Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: 💾 Cache .buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('main.py') }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      - name: 🔨 Build Debug APK
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: 🔍 Locate and collect APK files
        run: |
          echo "=== APK 검색 ==="
          find . -name "*.apk" 2>/dev/null || echo "없음"

          mkdir -p output

          if find bin -name "*.apk" 2>/dev/null | grep -q .; then
            cp bin/*.apk output/
          elif find .buildozer -name "*.apk" 2>/dev/null | grep -q .; then
            find .buildozer -name "*.apk" -exec cp {} output/ \;
          else
            echo "❌ APK 없음 - 로그 확인:"
            tail -100 build.log
            exit 1
          fi

          ls -lh output/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: space-escape-game-debug-apk
          path: output/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📋 Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-failure-log
          path: build.log
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📥 Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: space-escape-game-debug-apk
          path: ./release-apk

      - name: 🏷️ Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: "Space Escape Game ${{ github.ref_name }}"
          body: |
            ## 🚀 Space Escape Game ${{ github.ref_name }}
            **개발사:** 오리온 | **개발자:** 박시현

            ### 설치 방법
            1. 아래 `.apk` 파일을 안드로이드 기기에 다운로드
            2. 설정 → 보안 → **출처를 알 수 없는 앱 설치** 허용
            3. APK 파일 실행하여 설치
          files: ./release-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
