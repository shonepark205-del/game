name: 🚀 Android APK Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential \
            ccache libltdl-dev

      - name: 🔧 Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.36

      - name: 📱 Configure Android SDK + NDK (pre-installed)
        run: |
          SDK_ROOT=/usr/local/lib/android/sdk
          NDK_ACTUAL=$SDK_ROOT/ndk/27.3.13750724

          # 라이선스 동의
          mkdir -p $SDK_ROOT/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > $SDK_ROOT/licenses/android-sdk-license

          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" "platforms;android-33" || true

          # Buildozer tools/bin 심볼릭 링크
          sudo mkdir -p $SDK_ROOT/tools/bin
          sudo ln -sf $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager
          sudo ln -sf $SDK_ROOT/cmdline-tools/latest/bin/avdmanager  $SDK_ROOT/tools/bin/avdmanager

          # ✅ Buildozer가 NDK를 다운로드하지 않도록
          # r25b 이름으로 기존 NDK 27 심볼릭 링크 생성
          mkdir -p $HOME/.buildozer/android/platform
          ln -sf $SDK_ROOT $HOME/.buildozer/android/platform/android-sdk
          ln -sf $NDK_ACTUAL $HOME/.buildozer/android/platform/android-ndk-r25b

          echo "=== NDK 심볼릭 링크 확인 ==="
          ls -la $HOME/.buildozer/android/platform/

          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "$SDK_ROOT/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$SDK_ROOT/tools/bin" >> $GITHUB_PATH

      - name: 💾 Cache .buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      - name: 🔨 Build Debug APK
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: 🔍 Collect APK
        run: |
          find . -name "*.apk" 2>/dev/null
          mkdir -p output
          if find bin -name "*.apk" 2>/dev/null | grep -q .; then
            cp bin/*.apk output/
          elif find .buildozer -name "*.apk" 2>/dev/null | grep -q .; then
            find .buildozer -name "*.apk" -exec cp {} output/ \;
          else
            grep -n "Error\|error\|FAILED\|Exception\|not found" build.log | grep -v "^#" | tail -30
            tail -50 build.log
            exit 1
          fi
          ls -lh output/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: space-escape-game-debug-apk
          path: output/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📋 Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-failure-log
          path: build.log
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: space-escape-game-debug-apk
          path: ./release-apk
      - uses: softprops/action-gh-release@v2
        with:
          name: "Space Escape Game ${{ github.ref_name }}"
          body: |
            ## 🚀 Space Escape Game ${{ github.ref_name }}
            **개발사:** 오리온 | **개발자:** 박시현
            ### 설치: APK 다운로드 → 출처 알 수 없는 앱 허용 → 설치
          files: ./release-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
